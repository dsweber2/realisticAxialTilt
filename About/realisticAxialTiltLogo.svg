  <!--
    Grid lines clipped to the globe circle, then rotated 45° so the planet
    appears tilted. rotate(45, 320, 195) puts the north pole at upper-right
    (405, 110) and south at lower-left (235, 280) — exactly where the axis
    line exits the sphere.

    Latitude ellipses: orthographic projection with perspective factor 0.267
      cy_e = 195 − 120·sin(lat),  rx = 120·cos(lat),  ry = rx·0.267

    Longitude ellipses: all centred at (320,195)
      rx = 120·sin(lon),  ry = 120
  -->
  <!-- Atmospheric rim -->
  <!--
    Rotation axis.
    The 45° rotation puts poles at (405, 110) N and (235, 280) S.
    Extend 50px beyond each: N tip (440, 75), S tip (200, 315).
    Direction unit vector: (sin45, −cos45) = (1/√2, −1/√2).
  -->
  <!-- wide blurred glow pass -->
